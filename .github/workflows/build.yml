name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ windows-latest, ubuntu-latest ]
        java-version: [ '17', '21' ]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: maven
      - name: Build and Test
        run: mvn clean verify "-Dgpg.skip=true"
      - uses: actions/upload-artifact@v4
        if: matrix.os == 'windows-latest' && matrix.java-version == '17'
        with:
          name: jmx-version-control-system
          path: target/jmx-version-control-system-*.jar
